name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv runpytest tests/ -v --tb=short

  dbt-compile:
    name: dbt compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Write GCP key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/key.json

      - name: dbt compile
        working-directory: dbt/f1_pipeline
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/key.json
        run: uv rundbt compile --profiles-dir . --target prod
