f1_pipeline:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: f1-analytics-pipeline
      dataset: dbt_dev
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      location: US
      threads: 4
      timeout_seconds: 300
    prod:
      type: bigquery
      method: service-account
      project: f1-analytics-pipeline
      dataset: dbt_prod
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      location: US
      threads: 4
      timeout_seconds: 300
